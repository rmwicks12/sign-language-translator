<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Language Translator</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        video { border: 4px solid #4CAF50; border-radius: 10px; margin-top: 20px; width: 640px; max-width: 100%; }
    </style>
</head>
<body>
    <h1>Real-Time Translator</h1>
    <video id="webcam" autoplay playsinline></video>

    <script>
        // JavaScript to access the Windows 11 webcam
        const videoElement = document.getElementById('webcam');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = stream;
            } catch (error) {
                console.error("Error accessing the webcam:", error);
                alert("Please allow camera permissions in your browser.");
            }
        }

        startCamera();
    </script>
</body>
</html>
