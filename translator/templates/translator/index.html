<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hand Tracker</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .video-container { position: relative; display: inline-block; margin-top: 20px; }
        /* The canvas sits directly on top of the video to draw the tracking dots */
        video { border: 4px solid #4CAF50; border-radius: 10px; width: 640px; max-width: 100%; display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; border-radius: 10px; }
        #status { margin-top: 15px; font-weight: bold; color: #ffeb3b; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>Real-Time AI Hand Tracking</h1>
    <p id="status">Loading AI Model...</p>
    
    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');
        // 1. Establish the WebSocket connection to Django
        const socket = new WebSocket('ws://' + window.location.host + '/ws/translate/');
        
        socket.onopen = function(e) {
            console.log("🟢 Connected to Django Backend!");
        };
        
        socket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            console.log("Message from server:", data.message);
        };
        
        socket.onclose = function(e) {
            console.error("🔴 WebSocket closed unexpectedly");
        };

        // Setup the MediaPipe Hands AI
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // What to do when the AI detects a hand
        // What to do when the AI detects a hand
        // What to do when the AI detects a hand
        hands.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw the video frame
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            // Check if hands are detected AND the array is not empty
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Hand IS on screen
                statusText.innerText = "AI Active: Hand Detected!";
                statusText.style.color = "#4CAF50";

                // --- NEW: Send the live coordinates to Django via WebSocket ---
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({
                        'landmarks': results.multiHandLandmarks
                    }));
                }

                // Draw the digital skeleton over the hands
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2, radius: 4});
                }
            } else {
                // No hand on screen
                statusText.innerText = "AI Active: Waiting for hands...";
                statusText.style.color = "#ffeb3b";
            }
            canvasCtx.restore();
        });

        // Initialize the camera and feed it directly to the AI
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                // Ensure canvas matches video dimensions
                if(canvasElement.width !== videoElement.videoWidth){
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                }
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });

        camera.start();
    </script>
</body>
</html>
