<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Collection Studio</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; }
        .control-panel { margin: 20px; padding: 20px; background-color: #333; border-radius: 10px; display: inline-block; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-right: 10px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        .video-container { position: relative; display: inline-block; margin-top: 10px; }
        video { border: 4px solid #2196F3; border-radius: 10px; width: 640px; display: block; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; border-radius: 10px; }
        #status { margin-top: 15px; font-weight: bold; color: #ffeb3b; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <h1>Dataset Collection Studio</h1>
    
    <div class="control-panel">
        <input type="text" id="signName" placeholder="Enter word (e.g., Hello)">
        <button id="recordBtn" onclick="startRecording()">Start Recording</button>
    </div>

    <p id="status">Loading AI Model...</p>
    
    <div class="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status');
        const signInput = document.getElementById('signName');
        const recordBtn = document.getElementById('recordBtn');

        let isRecording = false;
        let recordedFrames = [];
        const FRAMES_TO_RECORD = 30; // An LSTM model typically needs exactly 30 frames of movement

        function startRecording() {
            const word = signInput.value.trim();
            if (!word) {
                alert("Please enter the word you are about to sign.");
                return;
            }
            isRecording = true;
            recordedFrames = [];
            recordBtn.disabled = true;
            statusText.innerText = `🔴 Recording "${word}"... Perform the sign now!`;
            statusText.style.color = "#f44336";
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        let isShowingSuccess = false; // New flag to freeze the text

        hands.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                
                // Only update to "Ready" if we aren't currently showing a success message
                if (!isRecording && !isShowingSuccess) {
                    statusText.innerText = "Ready to record. Enter word and press Start.";
                    statusText.style.color = "#4CAF50";
                }

                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 3});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2, radius: 4});
                }

                if (isRecording) {
                    recordedFrames.push(results.multiHandLandmarks);
                    
                    if (recordedFrames.length >= FRAMES_TO_RECORD) {
                        isRecording = false;
                        recordBtn.disabled = false;
                        
                        // Freeze the UI text for 3 seconds
                        isShowingSuccess = true;
                        statusText.innerText = `✅ Success! Recorded 30 frames for "${signInput.value}"`;
                        statusText.style.color = "#4CAF50";
                        setTimeout(() => { isShowingSuccess = false; }, 3000);
                        
                        // Send the data to the Django backend!
                        fetch('/save_dataset/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                word: signInput.value,
                                frames: recordedFrames
                            })
                        })
                        .then(response => response.json())
                        .then(data => console.log("Backend confirmed save:", data))
                        .catch(error => console.error("Error saving:", error));
                    }
                }
            } else {
                if (!isRecording && !isShowingSuccess) {
                    statusText.innerText = "Waiting for hands...";
                    statusText.style.color = "#ffeb3b";
                }
            }
            canvasCtx.restore();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                if(canvasElement.width !== videoElement.videoWidth){
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                }
                await hands.send({image: videoElement});
            }, width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
