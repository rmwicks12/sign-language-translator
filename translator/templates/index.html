<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mudrā | Real-Time Translator</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; text-align: center; margin: 0; padding: 20px;}
        .video-container { position: relative; width: 640px; height: 480px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        video, canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        .ui-panel { max-width: 600px; margin: 30px auto; padding: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .translation-box { font-size: 2.5em; font-weight: bold; color: #58a6ff; margin: 10px 0; text-transform: capitalize; }
    </style>
</head>
<body>

    <h2>Mudrā Translation Engine</h2>
    
    <div class="video-container">
        <video class="input_video" autoplay playsinline style="display:none;"></video>
        <canvas class="output_canvas" width="640" height="480"></canvas>
    </div>
    
    <div class="ui-panel">
        <div class="translation-box" id="translation_text">Waiting for gesture...</div>
        <div style="color: #8b949e;">AI Confidence: <span id="confidence_score">0.0</span>%</div>
    </div>

    <script>
        const videoElement = document.querySelector('.input_video');
        const canvasElement = document.querySelector('.output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const translationText = document.getElementById('translation_text');
        const confidenceScore = document.getElementById('confidence_score');

        // Safely resolve MediaPipe shortcuts from window namespace
        const mpHands = window;
        
        const socket = new WebSocket('ws://' + window.location.host + '/ws/translate/');
        
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if(data.prediction) {
                translationText.innerText = data.prediction;
                confidenceScore.innerText = (data.confidence * 100).toFixed(1);
            }
        };

        let coordinateSequence = [];

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Using explicit namespace references to avoid ReferenceErrors
                if (window.drawConnectors && window.HAND_CONNECTIONS) {
                    window.drawConnectors(canvasCtx, landmarks, window.HAND_CONNECTIONS, {color: '#58a6ff', lineWidth: 4});
                    window.drawLandmarks(canvasCtx, landmarks, {color: '#ffffff', lineWidth: 2, radius: 3});
                }
                
                let frameCoords = [];
                for (let i = 0; i < landmarks.length; i++) {
                    frameCoords.push(landmarks[i].x, landmarks[i].y, landmarks[i].z);
                }
                
                coordinateSequence.push(frameCoords);
                if (coordinateSequence.length > 30) {
                    coordinateSequence.shift();
                }
                
                if (coordinateSequence.length === 30 && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ 'coordinates': coordinateSequence }));
                }
            }
            canvasCtx.restore();
        }

        // Safely instantiate the Hands instance
        const HandsClass = window.Hands || (window.mpHands ? window.mpHands.Hands : null);
        if (!HandsClass) {
            console.error("MediaPipe Hands library failed to load via CDN resources.");
            translationText.innerText = "Error: Library Load Failure";
        } else {
            const hands = new HandsClass({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }});
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            hands.onResults(onResults);

            if (window.Camera) {
                const camera = new window.Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({image: videoElement});
                    },
                    width: 640,
                    height: 480
                });
                camera.start();
            } else {
                console.error("MediaPipe Camera Utils script not found.");
            }
        }
    </script>
</body>
</html>
